version: 2.1.1
homepage: https://dineshwayaman.com/
repository: https://github.com/dineshwayaman/BeTracky-Background-Location-Service
issue_tracker: https://github.com/dineshwayaman/BeTracky-Background-Location-Service/issues

topics:
  - location
  - background-service
  - gps
  - tracking
  - geolocation

environment:
  sdk: ^3.6.0
  flutter: ">=3.29.0"

dependencies:
