    sdk: flutter
  flutter_background_service: ^5.1.0
  workmanager: ^0.9.0
  geolocator: ^14.0.2
  http: ^1.6.0
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2+1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.0
